<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th scope="row">#</th>
            @for (item of grid.DisplayColumns; track $index) {
            <th scope="row">{{item}}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of data; track $index) {
        <tr>
            <th scope="row">{{$index+1}}</th>
            @for (column of grid.Columns; track $index) {
            <td>{{row[column]}}</td>
            }
            @if (grid.actionsBtns!=undefined&&grid.actionsBtns.length>0) {
            <td>
                @for (item of grid.actionsBtns; track $index) {
                <button [name]="item.name" [class]="item.className" (click)="item.onClick(row)">{{item.name}}</button>
                }
            </td>
            }
        </tr>

        }
    </tbody>
</table>

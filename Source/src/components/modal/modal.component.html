<div [class]="className()" id="Modal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">{{this.Heading}}</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
      {{this.Message}}
      </div>
      <div class="modal-footer">
        <app-buttons type="button" class="btn btn-secondary" data-bs-dismiss="modal" name="Close" [onClick]="CloseModal">Close</app-buttons>
        <app-buttons type="button" class="btn btn-primary" name="Save changes" [onClick]="ConfirmModal">Save changes</app-buttons>
      </div>
    </div>
  </div>
</div>
